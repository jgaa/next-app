name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to release without the leading v (e.g. 1.2.3)'
        required: true
      prerelease:
        description: 'Mark this as a prerelease?'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.tag }}
  RELEASE_TAG: v${{ github.event.inputs.tag }}
  SIGN_ID: "Developer ID Application: The Last Viking LTD ood (G7GPB64J77)"
  QT_SDK_VERSION: "6.11.0"
  QT_SDK_BASE_URL: "https://next-app.org/ci"
  QT_SDK_USERNAME: "jgaa"
  MACOS_DEPLOYMENT_TARGET: "15.0"

jobs:
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          submodules: true

      - name: Install Flatpak tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flatpak \
            flatpak-builder \
            rsync

      - name: Build Flatpak bundle
        env:
          WORK_ROOT: ${{ github.workspace }}/.flatpak-kde
        run: |
          set -euo pipefail
          bash ./building/build-flatpak-kde.sh

          BUNDLE_PATH="$(find "${WORK_ROOT}/dist" -maxdepth 1 -type f -name '*.flatpak' -print -quit)"
          test -n "${BUNDLE_PATH:-}" || { echo "::error::Flatpak bundle not found"; exit 1; }

          BUNDLE_NAME="$(basename "${BUNDLE_PATH}")"
          VERSION="$(sed -E 's/^NextApp-([0-9]+\.[0-9]+\.[0-9]+)-([A-Za-z0-9_]+)-stable\.flatpak$/\1/' <<< "${BUNDLE_NAME}")"
          ARCH="$(sed -E 's/^NextApp-([0-9]+\.[0-9]+\.[0-9]+)-([A-Za-z0-9_]+)-stable\.flatpak$/\2/' <<< "${BUNDLE_NAME}")"

          test "${VERSION}" = "${{ env.VERSION }}" || {
            echo "::error::Flatpak version ${VERSION} does not match release version ${{ env.VERSION }}"
            exit 1
          }

          echo "FLATPAK_PATH=${BUNDLE_PATH}" >> "$GITHUB_ENV"
          echo "FLATPAK_ARTIFACT_NAME=nextapp-flatpak-${ARCH}-${VERSION}" >> "$GITHUB_ENV"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FLATPAK_ARTIFACT_NAME }}
          path: ${{ env.FLATPAK_PATH }}
          if-no-files-found: error
          retention-days: 7

  prepare-qt-sdk:
    name: Prepare Qt SDK archive
    runs-on: macos-15

    defaults:
      run:
        shell: bash

    steps:
      - name: Restore Qt SDK archive cache
        id: cache-qt-sdk
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/qt-sdk-cache/qt-${{ env.QT_SDK_VERSION }}-macos.tar.zst
          key: macos-qt-sdk-${{ env.QT_SDK_VERSION }}

      - name: Download Qt SDK archive
        if: steps.cache-qt-sdk.outputs.cache-hit != 'true'
        env:
          QT_SDK_BASE_URL: ${{ env.QT_SDK_BASE_URL }}
          QT_SDK_USERNAME: ${{ env.QT_SDK_USERNAME }}
          QT_SDK_PASSWORD: ${{ secrets.QT_SDK_PASSWORD }}
          QT_SDK_VERSION: ${{ env.QT_SDK_VERSION }}
        run: |
          set -euo pipefail

          QT_SDK_URL="${QT_SDK_BASE_URL}/qt-${QT_SDK_VERSION}-macos.tar.zst"
          QT_SDK_ARCHIVE="${RUNNER_TEMP}/qt-sdk-cache/qt-${QT_SDK_VERSION}-macos.tar.zst"

          test -n "${QT_SDK_URL:-}" || { echo "::error::Missing QT_SDK_URL"; exit 1; }
          test -n "${QT_SDK_USERNAME:-}" || { echo "::error::Missing QT_SDK_USERNAME value"; exit 1; }
          test -n "${QT_SDK_PASSWORD:-}" || { echo "::error::Missing QT_SDK_PASSWORD secret"; exit 1; }

          mkdir -p "$(dirname "${QT_SDK_ARCHIVE}")"

          curl --fail --show-error --location \
            --user "${QT_SDK_USERNAME}:${QT_SDK_PASSWORD}" \
            --output "${QT_SDK_ARCHIVE}" \
            "${QT_SDK_URL}"

      - name: Save Qt SDK archive cache
        if: steps.cache-qt-sdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/qt-sdk-cache/qt-${{ env.QT_SDK_VERSION }}-macos.tar.zst
          key: macos-qt-sdk-${{ env.QT_SDK_VERSION }}

  build-macos:
    name: Build macOS (x86_64)
    needs: prepare-qt-sdk
    runs-on: macos-15-intel

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          submodules: true

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASS }}

      - name: Install build dependencies
        run: |
          set -euo pipefail
          brew update
          brew install ninja pkg-config openssl@3 boost protobuf

      - name: Restore Qt SDK archive cache
        id: cache-qt-sdk
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/qt-sdk-cache/qt-${{ env.QT_SDK_VERSION }}-macos.tar.zst
          key: macos-qt-sdk-${{ env.QT_SDK_VERSION }}

      - name: Extract Qt SDK
        env:
          QT_SDK_VERSION: ${{ env.QT_SDK_VERSION }}
        run: |
          set -euo pipefail

          QT_SDK_ARCHIVE="${RUNNER_TEMP}/qt-sdk-cache/qt-${QT_SDK_VERSION}-macos.tar.zst"
          test -f "${QT_SDK_ARCHIVE}" || { echo "::error::Qt SDK archive ${QT_SDK_ARCHIVE} not found"; exit 1; }

          rm -rf qt-sdk
          mkdir -p qt-sdk
          tar -xf "${QT_SDK_ARCHIVE}" -C qt-sdk

          QT_ROOT="${PWD}/qt-sdk/${QT_SDK_VERSION}"
          test -d "${QT_ROOT}" || { echo "::error::Expected Qt SDK root ${QT_ROOT} missing after extract"; exit 1; }

          QT_MACDEPLOYQT="$(find "${QT_ROOT}" -type f -path '*/bin/macdeployqt' -print -quit)"
          test -n "${QT_MACDEPLOYQT:-}" || { echo "::error::Unable to locate macdeployqt in downloaded Qt SDK"; exit 1; }

          QT_PREFIX="$(cd "$(dirname "${QT_MACDEPLOYQT}")/.." && pwd)"
          QT_CMAKE="$(find "${QT_ROOT}" -type f -path '*/bin/qt-cmake' -print -quit)"
          test -n "${QT_CMAKE:-}" || { echo "::error::Unable to locate qt-cmake in downloaded Qt SDK"; exit 1; }

          echo "QT_ROOT=${QT_ROOT}" >> "$GITHUB_ENV"
          echo "QT_PREFIX=${QT_PREFIX}" >> "$GITHUB_ENV"
          echo "QT_CMAKE=${QT_CMAKE}" >> "$GITHUB_ENV"
          echo "QT_MACDEPLOYQT=${QT_MACDEPLOYQT}" >> "$GITHUB_ENV"

      - name: Configure, build, bundle and package
        env:
          BUILD_DIR: ${{ github.workspace }}/build-macos-x86_64
          STAGE_DIR: ${{ github.workspace }}/stage-macos-x86_64
          DMG_DIR: ${{ github.workspace }}/dmg-macos-x86_64
        run: |
          set -euo pipefail

          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          BOOST_PREFIX="$(brew --prefix boost)"

          rm -rf "${BUILD_DIR}" "${STAGE_DIR}" "${DMG_DIR}"

          "${QT_CMAKE}" -S "${GITHUB_WORKSPACE}" -B "${BUILD_DIR}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${MACOS_DEPLOYMENT_TARGET}" \
            -DCMAKE_PREFIX_PATH="${OPENSSL_PREFIX};${BOOST_PREFIX}" \
            -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}" \
            -DNEXTAPP_WITH_TESTS=OFF \
            -DNEXTAPP_WITH_BACKEND=OFF \
            -DNEXTAPP_WITH_SIGNUP=OFF \
            -DUSE_STATIC_QT=OFF \
            -DSIGN_ID="${SIGN_ID}"

          cmake --build "${BUILD_DIR}" --config Release
          cmake --install "${BUILD_DIR}" --prefix "${STAGE_DIR}" --component Application

          APP_PATH="$(find "${STAGE_DIR}" -maxdepth 2 -type d -name 'nextapp.app' -print -quit)"
          test -n "${APP_PATH:-}" || { echo "::error::Unable to locate installed nextapp.app"; exit 1; }

          "${QT_MACDEPLOYQT}" "${APP_PATH}" \
            -always-overwrite \
            -verbose=2 \
            -qmldir="${GITHUB_WORKSPACE}/src/NextAppUi" \
            -codesign="${SIGN_ID}"

          codesign --force --deep --options runtime --sign "${SIGN_ID}" "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"

          APP_BIN="${APP_PATH}/Contents/MacOS/nextapp"
          lipo "${APP_BIN}" -verify_arch "x86_64"

          VERSION="$(< "${BUILD_DIR}/VERSION.txt")"
          test "${VERSION}" = "${{ env.VERSION }}" || {
            echo "::error::macOS version ${VERSION} does not match release version ${{ env.VERSION }}"
            exit 1
          }

          DMG_NAME="nextapp-macos-x86_64-${VERSION}.dmg"
          mkdir -p "${DMG_DIR}"
          ditto "${APP_PATH}" "${DMG_DIR}/nextapp.app"
          ln -s /Applications "${DMG_DIR}/Applications"

          hdiutil create \
            -volname "NextApp ${VERSION}" \
            -srcfolder "${DMG_DIR}" \
            -ov \
            -format UDZO \
            "${BUILD_DIR}/${DMG_NAME}"

          codesign --force --sign "${SIGN_ID}" "${BUILD_DIR}/${DMG_NAME}" || true

          echo "DMG_PATH=${BUILD_DIR}/${DMG_NAME}" >> "$GITHUB_ENV"
          echo "DMG_ARTIFACT_NAME=nextapp-macos-x86_64-dmg-${VERSION}" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_ARTIFACT_NAME }}
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error
          retention-days: 7

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-flatpak
      - build-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show release files
        run: find artifacts -maxdepth 2 -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          body_path: ${{ github.workspace }}/CHANGELOG.txt
          files: |
            artifacts/**/*.flatpak
            artifacts/**/*.dmg
