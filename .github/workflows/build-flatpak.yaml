name: Build Flatpak

on:
  workflow_call:
    inputs:
      source_ref:
        required: false
        type: string
      expected_version:
        required: false
        type: string
      artifact_retention_days:
        required: false
        type: number
        default: 7
  workflow_dispatch:
  push:
    branches:
      - main
      - devel
      - ga-flatpak
    paths:
      - '.github/workflows/build-flatpak.yaml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'flatpak/**'
      - 'building/build-flatpak-kde.sh'
      - 'dependencies/date'
      - 'dependencies/date/**'
      - 'dependencies/expected'
      - 'dependencies/expected/**'
      - 'dependencies/logfault'
      - 'dependencies/logfault/**'
      - 'dependencies/qcoro'
      - 'dependencies/qcoro/**'

permissions:
  contents: read

jobs:
  build-flatpak:
    name: Build Flatpak (x86_64)
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.ref }}
          show-progress: false
          submodules: true

      - name: Install Flatpak tooling
        run: |
          set -euo pipefail
          sudo apt-get -qq update
          sudo apt-get -qq install -y --no-install-recommends \
            flatpak \
            flatpak-builder \
            rsync

      - name: Install AppStream build dependencies
        run: |
          set -euo pipefail
          sudo apt-get -qq update
          sudo apt-get -qq install -y --no-install-recommends \
            git \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            bash-completion \
            gettext \
            itstool \
            gperf \
            libglib2.0-dev \
            libxml2-dev \
            libfyaml-dev \
            libxmlb-dev \
            libcurl4-gnutls-dev \
            libgdk-pixbuf-2.0-dev \
            librsvg2-dev \
            libcairo2-dev \
            libfontconfig-dev \
            libpango1.0-dev \
            libfreetype-dev \
            gobject-introspection \
            libgirepository1.0-dev

      - name: Build patched AppStream compose client
        env:
          APPSTREAM_REPO: https://github.com/jgaa/appstream.git
          APPSTREAM_BRANCH: jgaa-add-error-info
          APPSTREAM_SRC_DIR: ${{ runner.temp }}/appstream-src
          APPSTREAM_BUILD_DIR: ${{ runner.temp }}/appstream-build
        run: |
          set -euo pipefail
          rm -rf "${APPSTREAM_SRC_DIR}" "${APPSTREAM_BUILD_DIR}"
          git clone --branch "${APPSTREAM_BRANCH}" --single-branch "${APPSTREAM_REPO}" "${APPSTREAM_SRC_DIR}"
          meson setup "${APPSTREAM_BUILD_DIR}" \
            "${APPSTREAM_SRC_DIR}" \
            -Dcompose=true \
            -Dsvg-support=true \
            -Dstemming=false \
            -Dqt=false \
            -Dvapi=false \
            -Ddocs=false \
            -Dman=false \
            -Dgir=false \
            -Dapt-support=false \
            -Dsystemd=false \
            -Dblake3-support=false
          meson compile -C "${APPSTREAM_BUILD_DIR}" appstreamcli appstreamcli-compose

      - name: Install patched AppStream client ahead of distro one
        env:
          APPSTREAM_BUILD_DIR: ${{ runner.temp }}/appstream-build
        run: |
          set -euo pipefail
          sudo install -Dm755 "${APPSTREAM_BUILD_DIR}/tools/appstreamcli" /usr/local/bin/appstreamcli
          sudo install -Dm755 "${APPSTREAM_BUILD_DIR}/tools/appstreamcli-compose" /usr/local/libexec/appstreamcli-compose
          sudo install -Dm755 "${APPSTREAM_BUILD_DIR}/compose/libappstream-compose.so.0" /usr/local/lib/libappstream-compose.so.0
          sudo ldconfig

      - name: Verify patched client and SVG support
        run: |
          set -euo pipefail
          which appstreamcli
          appstreamcli --version
          ldd /usr/local/libexec/appstreamcli-compose | grep -i rsvg
          ldd /usr/local/lib/libappstream-compose.so.0 | grep -i rsvg

      - name: Build Flatpak bundle
        env:
          WORK_ROOT: ${{ github.workspace }}/.flatpak-kde
          APPSTREAMCLI_COMPOSE_PRINT_REPORT: full
        run: |
          set -euo pipefail
          bash ./building/build-flatpak-kde.sh

          BUNDLE_PATH="$(find "${WORK_ROOT}/dist" -maxdepth 1 -type f -name '*.flatpak' -print -quit)"
          test -n "${BUNDLE_PATH:-}" || { echo "::error::Flatpak bundle not found"; exit 1; }

          BUNDLE_NAME="$(basename "${BUNDLE_PATH}")"
          VERSION="$(sed -E 's/^NextApp-([0-9]+\.[0-9]+\.[0-9]+)-([A-Za-z0-9_-]+)-stable\.flatpak$/\1/' <<< "${BUNDLE_NAME}")"
          ARCH="$(sed -E 's/^NextApp-([0-9]+\.[0-9]+\.[0-9]+)-([A-Za-z0-9_-]+)-stable\.flatpak$/\2/' <<< "${BUNDLE_NAME}")"

          test "${VERSION}" != "${BUNDLE_NAME}" || { echo "::error::Unable to parse version from ${BUNDLE_NAME}"; exit 1; }
          test "${ARCH}" != "${BUNDLE_NAME}" || { echo "::error::Unable to parse architecture from ${BUNDLE_NAME}"; exit 1; }
          if [[ -n "${{ inputs.expected_version }}" && "${VERSION}" != "${{ inputs.expected_version }}" ]]; then
            echo "::error::Flatpak version ${VERSION} does not match expected version ${{ inputs.expected_version }}"
            exit 1
          fi

          echo "NEXTAPP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "NEXTAPP_ARCH=${ARCH}" >> "$GITHUB_ENV"
          echo "FLATPAK_PATH=${BUNDLE_PATH}" >> "$GITHUB_ENV"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextapp-flatpak-${{ env.NEXTAPP_ARCH }}-${{ env.NEXTAPP_VERSION }}
          path: ${{ env.FLATPAK_PATH }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
