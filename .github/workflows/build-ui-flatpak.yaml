name: Build UI Flatpak

on:
  push:
    branches:
      - main
      - flatpak-ga

permissions:
  contents: read

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.9
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Read NEXTAPP_VERSION from CMakeLists.txt
        run: |
          ver=$(grep -oP '(?<=set\(NEXTAPP_VERSION )[0-9.]+' CMakeLists.txt | head -1)
          echo "NEXTAPP_VERSION=$ver" >> $GITHUB_ENV
          echo "✅ NEXTAPP_VERSION=$ver"

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: NextApp.flatpak
          manifest-path: flatpak/eu.lastviking.NextApp.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: NextApp.flatpak-${{ env.NEXTAPP_VERSION }}
          path: NextApp.flatpak
          retention-days: 14
