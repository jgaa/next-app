name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to release, with or without the leading v (e.g. 1.2.3 or v1.2.3)'
        required: true
      prerelease:
        description: 'Mark this as a prerelease?'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Normalize release inputs
        id: release
        run: |
          set -euo pipefail

          RAW_TAG="${{ github.event.inputs.tag }}"
          VERSION="${RAW_TAG#v}"
          RELEASE_TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.release_tag }}

      - name: Find latest successful Flatpak run on main
        id: flatpak-run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflow_id = "build-flatpak.yaml";
            const branch = "main";
            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              status: "success",
              per_page: 1,
            });

            const run = response.data.workflow_runs[0];
            if (!run) {
              core.setFailed("No successful Build Flatpak workflow run found on main.");
              return;
            }

            core.setOutput("run_id", String(run.id));

      - name: Find latest successful macOS run on main
        id: macos-run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflow_id = "build-macos.yaml";
            const branch = "main";
            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              status: "success",
              per_page: 1,
            });

            const run = response.data.workflow_runs[0];
            if (!run) {
              core.setFailed("No successful Build macOS workflow run found on main.");
              return;
            }

            core.setOutput("run_id", String(run.id));

      - name: Download Flatpak artifact from main build
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.flatpak-run.outputs.run_id }}
          pattern: nextapp-flatpak-*-${{ steps.release.outputs.version }}
          path: artifacts/flatpak
          merge-multiple: true

      - name: Download macOS artifacts from main build
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.macos-run.outputs.run_id }}
          pattern: nextapp-macos-*-dmg-${{ steps.release.outputs.version }}
          path: artifacts/macos
          merge-multiple: true

      - name: Verify release artifacts exist
        run: |
          set -euo pipefail
          find artifacts -maxdepth 2 -type f | sort
          find artifacts -type f -name "*.flatpak" | grep -q .
          find artifacts -type f -name "*.dmg" | grep -q .

      - name: Show release files
        run: find artifacts -maxdepth 2 -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: Release ${{ steps.release.outputs.release_tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          body_path: ${{ github.workspace }}/CHANGELOG.txt
          files: |
            artifacts/**/*.flatpak
            artifacts/**/*.dmg
