name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to release without the leading v (e.g. 1.2.3)'
        required: true
      prerelease:
        description: 'Mark this as a prerelease?'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.tag }}
  RELEASE_TAG: v${{ github.event.inputs.tag }}

jobs:
  build-flatpak:
    uses: ./.github/workflows/build-flatpak.yaml
    with:
      source_ref: ${{ format('v{0}', github.event.inputs.tag) }}
      expected_version: ${{ github.event.inputs.tag }}
      artifact_retention_days: 7
    secrets: inherit

  build-macos:
    uses: ./.github/workflows/build-macos.yaml
    with:
      source_ref: ${{ format('v{0}', github.event.inputs.tag) }}
      expected_version: ${{ github.event.inputs.tag }}
      artifact_retention_days: 7
    secrets: inherit

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-flatpak
      - build-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show release files
        run: find artifacts -maxdepth 2 -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          body_path: ${{ github.workspace }}/CHANGELOG.txt
          files: |
            artifacts/**/*.flatpak
            artifacts/**/*.dmg
